        h1 { margin: 0; font-size: 2.2rem; background: linear-gradient(90deg, #f59e0b, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .sub { color: #71717a; margin: 5px 0 35px 0; font-size: 0.9rem; }

        .topic-out { font-size: 1.5rem; line-height: 1.5; font-weight: 500; }
        .footer { margin-top: 25px; font-size: 0.75rem; color: #52525b; font-family: monospace; text-align: right; border-top: 1px solid #27272a; padding-top: 15px; }
    </style>
</head>
<body>

                {e: "will shift the political weight toward populous Northern states.", h: "राजनीतिक वजन को अधिक आबादी वाले उत्तरी राज्यों की ओर झुका देगा।"},

            ]

        gl: {
            s: [
                {e: "Trump's 48-hour ultimatum to Iran (April 5)", h: "ईरान को ट्रम्प का 48 घंटे का अल्टीमेटम (5 अप्रैल)"},

    function generate() {
        const cat = document.getElementById('cat').value;
        const lang = document.getElementById('lang').value;
        const sA = document.getElementById('sideA').value.trim();
        const sB = document.getElementById('sideB').value.trim();
        
        const pool = db[cat];
        const s = pool.s[Math.floor(Math.random() * 3)];
        const c = pool.c[Math.floor(Math.random() * 3)];

        let out = "";
        if (sA && sB) {
            out = (lang === 'mix') ? `${sA} और ${sB} की तुलना असल में 2026 का सबसे बड़ा मुद्दा है।` : `The comparison between ${sA} and ${sB} is the defining debate of 2026.`;
        } else {
            if (lang === 'mix') out = `${s.e} असल में ${c.h}`;
            else if (lang === 'hi') out = `${s.h} ${c.h}`;
            else out = `${s.e} ${c.e}`;
        }

        document.getElementById('topic').innerText = out;
        document.getElementById('meta').innerText = `DATA_REF: 050426_${cat.toUpperCase()} | SYNC: 18:50`;
    }
</script>

</body>
