<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Debater | Live April 5, 2026</title>
    <style>
        :root { --accent: #f97316; --bg: #09090b; --card: #151518; --border: #27272a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f4f4f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .main-app { width: 95%; max-width: 850px; background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.8); position: relative; }
        
        .live-tag { position: absolute; top: 25px; right: 25px; background: #ef4444; color: white; padding: 4px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 900; letter-spacing: 1px; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        h1 { margin: 0; font-size: 2.2rem; background: linear-gradient(90deg, #f97316, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.sub { color: #71717a; margin: 5px 0 30px 0; font-size: 0.95rem; }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        select, input { background: #000; border: 1px solid var(--border); color: white; padding: 15px; border-radius: 14px; font-size: 1rem; outline: none; transition: 0.3s; width: 100%; box-sizing: border-box; }
        select:focus { border-color: var(--accent); }

        .btn-row { display: flex; gap: 12px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        .btn-gen { background: var(--accent); color: #000; }
        .btn-rand { background: #6366f1; color: #fff; }
        button:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        #output-zone { margin-top: 35px; padding: 35px; background: #000; border-radius: 24px; border-left: 6px solid var(--accent); min-height: 140px; display: flex; align-items: center; }
        .topic-display { font-size: 1.6rem; line-height: 1.5; font-weight: 500; color: #fff; }
        .footer { margin-top: 20px; font-size: 0.75rem; color: #52525b; text-align: right; font-family: monospace; border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body>

<div class="main-app">
    <div class="live-tag">LIVE SYNC</div>
    <h1>Sovereign Debater</h1>
    <p class="sub">April 5, 2026 | New Delhi Budget Session & West Asia Crisis Feed</p>

    <div class="control-grid">
        <select id="region">
            <option value="in">India: Parliament & Crisis</option>
            <option value="gl">Global: Iran-US Conflict</option>
            <option value="ipl">IPL 2026 Standings (RR #1)</option>
        </select>
        <select id="lang">
            <option value="mix">Hinglish (Mix)</option>
            <option value="en">English (Pro)</option>
            <option value="hi">Hindi (Shuddh)</option>
        </select>
    </div>

    <div class="control-grid">
        <input type="text" id="sideA" placeholder="Side A (e.g. Lok Sabha)">
        <input type="text" id="sideB" placeholder="Side B (e.g. Delimitation)">
    </div>

    <div class="btn-row">
        <button class="btn-gen" onclick="generate()">Generate Topic</button>
        <button class="btn-rand" onclick="randomize()">Random Surprise</button>
    </div>

    <div id="output-zone">
        <div id="topic" class="topic-display">Select category and hit Generate...</div>
    </div>
    
    <div class="footer" id="meta">SYSTEM_IDLE | FEED_TIME: 17:37 IST</div>
</div>

<script>
    const db = {
        in: {
            s: [
                {e: "The PM's 3-day extension of Budget Session (April 16-18)", h: "बजट सत्र का 16-18 अप्रैल तक विस्तार"},
                {e: "Akhilesh Yadav's 'Weapon of Mass Distraction' remark", h: "अखिलेश यादव का 'Weapon of Mass Distraction' वाला बयान"},
                {e: "The promise of no seat reduction for Southern states", h: "दक्षिण राज्यों की सीटों में कटौती न करने का वादा"}
            ],
            c: [
                {e: "is essential to implement the 33% Women's Quota by 2029.", h: "2029 तक 33% महिला कोटा लागू करने के लिए अनिवार्य है।"},
                {e: "is a tactical move to ignore the West Asia economic impact.", h: "पश्चिम एशिया के आर्थिक प्रभाव को नजरअंदाज करने की एक चाल है।"},
                {e: "will define the next 50 years of Indian federalism.", h: "भारतीय संघवाद के अगले 50 वर्षों को परिभाषित करेगा।"}
            ]
        },
        gl: {
            s: [
                {e: "Trump's 48-hour ultimatum to Tehran on Strait of Hormuz", h: "हॉर्मुज जलडमरूमध्य पर ईरान को ट्रम्प का 48 घंटे का अल्टीमेटम"},
                {e: "The rescue of the missing US airman from Iranian territory", h: "ईरानी क्षेत्र से लापता अमेरिकी एयरमैन का रेस्क्यू"},
                {e: "Kuwait's drone strikes on oil sector complexes", h: "कुवैत के तेल क्षेत्र परिसरों पर ड्रोन हमले"}
            ],
            c: [
                {e: "is pushing the world toward a catastrophic energy crisis.", h: "दुनिया को एक विनाशकारी ऊर्जा संकट की ओर धकेल रहा है।"},
                {e: "proves the fragility of the 52-year-old Petrodollar system.", h: "52 साल पुराने पेट्रोडॉलर सिस्टम की कमजोरी को साबित करता है।"},
                {e: "violates international norms and risks radiological release.", h: "अंतर्राष्ट्रीय मानदंडों का उल्लंघन है और रेडियोलॉजिकल रिस्क बढ़ाता है।"}
            ]
        },
        ipl: {
            s: [
                {e: "Rajasthan Royals' Rank 1 dominance (RR 4 pts, +2.233 NRR)", h: "राजस्थान रॉयल्स का नंबर 1 प्रभुत्व (RR 4 अंक)"},
                {e: "CSK's Rank 10 crisis (2 losses, -2.562 NRR)", h: "CSK का नंबर 10 संकट (2 हार, -2.562 NRR)"},
                {e: "Punjab Kings' rise to Rank 3 (PBKS 4 pts)", h: "पंजाब किंग्स का नंबर 3 पर उदय (PBKS 4 अंक)"}
            ],
            c: [
                {e: "is a sign of the 'Tactical 2.0' era of IPL bowling.", h: "IPL गेंदबाजी के 'Tactical 2.0' युग का संकेत है।"},
                {e: "proves that legacy teams like CSK must reinvent or perish.", h: "साबित करता है कि CSK जैसे पुराने दिग्गजों को खुद को बदलना होगा।"},
                {e: "is making the 2026 Orange Cap race the tightest ever.", h: "2026 की ऑरेंज कैप रेस को अब तक की सबसे कठिन बना रहा है।"}
            ]
        }
    };

    function generate() {
        const lang = document.getElementById('lang').value;
        const reg = document.getElementById('region').value;
        const sA = document.getElementById('sideA').value.trim();
        const sB = document.getElementById('sideB').value.trim();
        
        const pool = db[reg];
        const s = pool.s[Math.floor(Math.random() * 3)];
        const c = pool.c[Math.floor(Math.random() * 3)];

        let out = "";
        if (sA && sB) {
            out = (lang === 'mix') ? `${sA} और ${sB} की बहस असल में 2026 का सबसे बड़ा मुद्दा है।` : `The clash between ${sA} and ${sB} is the definitive topic of 2026.`;
        } else {
            if (lang === 'mix') out = `${s.e} असल में ${c.h}`;
            else if (lang === 'hi') out = `${s.h} ${c.h}`;
            else out = `${s.e} ${c.e}`;
        }

        document.getElementById('topic').innerText = out;
        document.getElementById('meta').innerText = `DATA_REF: 05.04.26_${reg.toUpperCase()} | STATUS: SYNCED`;
    }

    function randomize() {
        const regions = ['in', 'gl', 'ipl'];
        document.getElementById('region').value = regions[Math.floor(Math.random() * 3)];
        generate();
    }
</script>

</body>
</html>
